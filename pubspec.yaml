name: jaafari_guide
description: "Jaafari Guide - A professional study and tests guide application."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  url_launcher: ^6.3.2
  firebase_core: ^4.7.0
  cloud_firestore: ^6.3.0
  firebase_auth: ^6.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  # هذه المكتبة هي المسؤولة عن تغيير أيقونة التطبيق تلقائياً
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  # هنا نقوم بتعريف مجلد الصور لكي يتعرف عليه التطبيق
  assets:
    - assets/app_icon.png

# إعدادات الأيقونة الخاصة بتطبيقك
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/app_icon.png"
  remove_alpha_ios: true