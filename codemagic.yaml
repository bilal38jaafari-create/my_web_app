workflows:
  android-debug:
    name: Android Build
    max_build_duration: 60
    environment:
      flutter: stable
    scripts:
      - name: Get dependencies
        script: flutter pub get
      - name: Build and Obfuscate APK
        # هذا هو السطر السحري الذي سيشفر الكود ويمنع أي شخص من قراءته
        script: flutter build apk --release --obfuscate --split-debug-info=build/app/outputs/symbols
    artifacts:
      - build/app/outputs/flutter-apk/*.apk